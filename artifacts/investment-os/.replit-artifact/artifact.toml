kind = "web"
previewPath = "/"
title = "Investment Operating System"
version = "1.0.0"
id = "artifacts/investment-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19372
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/investment-os run dev"

[services.env]
PORT = "19372"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/investment-os", "run", "build"]
publicDir = "artifacts/investment-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
