openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Investment Operating System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: brief
    description: Daily Brief operations
  - name: blueprint
    description: Blueprint operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /brief/today:
    get:
      operationId: getDailyBrief
      tags: [brief]
      summary: Get today's daily brief
      description: Returns the current daily brief with macro intelligence
      responses:
        "200":
          description: Daily brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyBrief"
  /blueprint:
    get:
      operationId: getBlueprint
      tags: [blueprint]
      summary: Get portfolio blueprint
      description: Returns the portfolio blueprint with candidate recommendations
      responses:
        "200":
          description: Blueprint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blueprint"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DataPoint:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        change:
          type: string
        direction:
          type: string
          enum: [up, down, flat]
        freshness:
          type: string
          enum: [current, latest_available, lagged, refresh_failed]
        asOf:
          type: string
      required:
        - label
        - value
        - freshness
        - asOf
    MacroSignal:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        headline:
          type: string
        whatHappened:
          type: string
        whatItMeans:
          type: string
        investmentImplication:
          type: string
        boundary:
          type: string
        reviewAction:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
        severity:
          type: string
          enum: [high, medium, low]
        date:
          type: string
      required:
        - id
        - category
        - headline
        - whatHappened
        - whatItMeans
        - investmentImplication
        - boundary
        - evidence
        - severity
        - date
    EvidenceItem:
      type: object
      properties:
        date:
          type: string
        source:
          type: string
        fact:
          type: string
        freshness:
          type: string
          enum: [current, latest_available, lagged, refresh_failed]
      required:
        - date
        - source
        - fact
        - freshness
    DailyBrief:
      type: object
      properties:
        briefDate:
          type: string
        briefId:
          type: string
        marketSnapshot:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
        macroSignals:
          type: array
          items:
            $ref: "#/components/schemas/MacroSignal"
        keyTheme:
          type: string
        summaryNarrative:
          type: string
      required:
        - briefDate
        - briefId
        - marketSnapshot
        - macroSignals
        - keyTheme
        - summaryNarrative
    Candidate:
      type: object
      properties:
        id:
          type: string
        ticker:
          type: string
        name:
          type: string
        assetClass:
          type: string
        currentStatus:
          type: object
          properties:
            price:
              type: string
            ytdReturn:
              type: string
            positionSize:
              type: string
            positionNote:
              type: string
            freshness:
              type: string
              enum: [current, latest_available, lagged, refresh_failed]
            asOf:
              type: string
          required:
            - price
            - freshness
            - asOf
        thesis:
          type: string
        investmentCase:
          type: string
        whyAheadOrBehind:
          type: string
        keyTradeoffs:
          type: array
          items:
            type: string
        decisionChangeConditions:
          type: array
          items:
            type: string
        supportingDetail:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
        readiness:
          type: object
          properties:
            status:
              type: string
              enum: [ready, watch, hold, exit]
            rationale:
              type: string
          required:
            - status
            - rationale
        allocation:
          type: object
          properties:
            current:
              type: number
            target:
              type: number
            weight:
              type: string
        sector:
          type: string
        geography:
          type: string
      required:
        - id
        - ticker
        - name
        - assetClass
        - currentStatus
        - thesis
        - investmentCase
        - whyAheadOrBehind
        - keyTradeoffs
        - decisionChangeConditions
        - supportingDetail
        - readiness
        - sector
        - geography
    Portfolio:
      type: object
      properties:
        totalValue:
          type: string
        cashWeight:
          type: number
        equityWeight:
          type: number
        bondWeight:
          type: number
        lastUpdated:
          type: string
        freshness:
          type: string
          enum: [current, latest_available, lagged, refresh_failed]
      required:
        - totalValue
        - cashWeight
        - equityWeight
        - bondWeight
        - lastUpdated
        - freshness
    Blueprint:
      type: object
      properties:
        blueprintDate:
          type: string
        portfolioSummary:
          type: object
          $ref: "#/components/schemas/Portfolio"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
        designPrinciples:
          type: array
          items:
            type: string
      required:
        - blueprintDate
        - portfolioSummary
        - candidates
        - designPrinciples
