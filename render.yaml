services:
  - type: web
    name: investment-sample
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/v2/health
    disk:
      name: investment-sample-data
      mountPath: /app/storage
      sizeGB: 1
    envVars:
      - key: IA_ENV
        value: production
      - key: IA_LOAD_LOCAL_ENV
        value: "0"
      - key: IA_CORTEX_FRONTEND_AUTOSTART
        value: "0"
      - key: IA_AUTH_ENABLED
        value: "1"
      - key: IA_AUTH_PUBLIC_HEALTH
        value: "1"
      - key: IA_AUTH_USERNAME
        value: investor
      - key: IA_AUTH_PASSWORD
        sync: false
      - key: IA_DB_PATH
        value: /app/storage/investment_agent.sqlite3
